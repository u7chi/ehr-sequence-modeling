# Fast end-to-end validation on a patient subset. Not for real results.
data:
  ccs_path:   data/ccs_pivot_5_years_selected.csv
  lab_path:   data/lab_pivot_5_years_selected_clean.csv
  index_path: data/indexdate.csv
  label_col:  CAD
  cache_dir:  outputs/cache_smoke
  develop_n:  1500

sequence:
  mode: windowed
  window_days: 0
  max_len: 512
  n_lab_bins: 4
  age_bin_width: 5
  n_age_bins: 20
  truncate_side: left

model:
  hidden: 128
  layers: 2
  heads: 4
  ff_mult: 4
  dropout: 0.1
  max_visits: 256

pretrain:
  enabled: true
  source: train
  mask_prob: 0.15
  epochs: 3
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.01
  warmup_frac: 0.1
  ckpt_name: smoke_mlm

finetune:
  epochs: 5
  batch_size: 64
  lr: 0.0001
  weight_decay: 0.01
  warmup_frac: 0.1
  imbalance: upsample
  from_pretrained: true
  freeze_encoder: false
  select_metric: auprc
  ckpt_name: smoke_cad

split:
  train: 0.64
  valid: 0.16
  test: 0.20
  seed: 42

device: cuda
seed: 42
